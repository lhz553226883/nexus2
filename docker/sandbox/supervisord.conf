[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
loglevel=info

[unix_http_server]
file=/var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

# ── Xvfb: Virtual framebuffer display ────────────────────────────────────────
[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 %(ENV_RESOLUTION)s -ac +extension GLX +render -noreset
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/xvfb.log
stderr_logfile=/var/log/supervisor/xvfb.log

# ── Openbox: Lightweight window manager ───────────────────────────────────────
[program:openbox]
command=/usr/bin/openbox --display :99
environment=DISPLAY=":99"
autorestart=true
priority=20
stdout_logfile=/var/log/supervisor/openbox.log
stderr_logfile=/var/log/supervisor/openbox.log

# ── x11vnc: VNC server (no xdamage to prevent black screen flicker) ───────────
[program:x11vnc]
command=/bin/bash -c 'sleep 2 && x11vnc -display :99 -forever -shared -noxdamage -nopw -rfbport 5900'
autorestart=true
priority=30
stdout_logfile=/var/log/supervisor/x11vnc.log
stderr_logfile=/var/log/supervisor/x11vnc.log

# ── noVNC: Web-based VNC client on port 6080 ────────────────────────────────────────────────────────────────────────────────
[program:novnc]
command=/bin/bash -c 'sleep 3 && websockify --web=/opt/novnc 6080 localhost:5900'
autorestart=true
priority=40
stdout_logfile=/var/log/supervisor/novnc.log
stderr_logfile=/var/log/supervisor/novnc.log

# ── xterm: Terminal emulator for visual command output ────────────────────────────────────────────────────────────────────────────────
[program:xterm]
command=/bin/bash -c 'sleep 4 && DISPLAY=:99 xterm -fa "Monospace" -fs 12 -bg black -fg green -geometry 120x35+0+0 -title "Nexus Terminal" -e bash'
environment=DISPLAY=":99"
autorestart=true
priority=50
stdout_logfile=/var/log/supervisor/xterm.log
stderr_logfile=/var/log/supervisor/xterm.log